<!DOCTYPE html>

<html lang="ms">

<head>

  <meta charset="UTF-8" />

<meta
 name="viewport"
 content="width=device-width, initial-scale=1.0"
/>

  <title>
    RMS Rumpun Selangor Registry
  </title>

  <link
    rel="stylesheet"
    href="style.css"
  />

</head>

<body>

<div class="container">

  <div class="card">

<img
  src="https://arleta.site/interactivelink/1610/RMS-JATA.png"
  alt="Logo RMS Rumpun Selangor"
  class="logo"
/>

<h1>
  RMS RUMPUN SELANGOR
</h1>

<p class="subtitle">
  Sistem Pendaftaran Penyertaan Program RMS Rumpun Selangor 2026
</p>

<div class="counter-container">
  <div class="counter-box">
    <h3 id="countPertubuhan">--</h3>
    <p>Pertubuhan Terlibat</p>
  </div>
  <div class="counter-box">
    <h3 id="countPeserta">--</h3>
    <p>Jumlah Peserta</p>
  </div>
</div>

<div class="latest-registrations" id="latestRegistrationsBox" style="display: none;">
  <h4>Pendaftaran Terbaru:</h4>
  <ul id="latestList"></ul>
</div>

<form id="silatForm">

  <label for="pertubuhan">
    Nama Pertubuhan
  </label>

  <input
    type="text"
    id="pertubuhan"
    name="pertubuhan"
    autocomplete="organization"
    required
  />

  <label for="pengerusi">
    Nama Pengerusi / Tok Guru
  </label>

  <input
    type="text"
    id="pengerusi"
    name="pengerusi"
    autocomplete="name"
    required
  />

  <label for="telefon">
    No. Telefon (WhatsApp)
  </label>

  <input
    type="tel"
    id="telefon"
    name="telefon"
    autocomplete="tel"
    inputmode="numeric"
    placeholder="Contoh: 012 345 6789"
    required
  />

  <label for="peserta">
    Jumlah Peserta
  </label>

  <input
    type="number"
    id="peserta"
    name="peserta"
    min="1"
    max="500"
    inputmode="numeric"
    required
  />

  <label for="catatan">
    Catatan
  </label>

  <textarea
    id="catatan"
    name="catatan"
    rows="4"
  ></textarea>

  <button type="submit">
    Hantar Penyertaan
  </button>

</form>

<div id="summary" class="summary-box" style="display: none;">
  <h2>Ringkasan Pendaftaran</h2>
  <p><strong>Pertubuhan:</strong> <span id="sumPertubuhan"></span></p>
  <p><strong>Pengerusi:</strong> <span id="sumPengerusi"></span></p>
  <p><strong>No. Telefon:</strong> <span id="sumTelefon"></span></p>
  <p><strong>Jumlah Peserta:</strong> <span id="sumPeserta"></span></p>
  <p><strong>Catatan:</strong> <span id="sumCatatan"></span></p>
  
  <button id="btnDaftarLagi" class="btn-secondary">Daftar Pasukan Lain</button>
</div>

<div id="status"></div>

<a id="shareBtn" class="share-btn" href="#" target="_blank" style="display: none;">
  Kongsikan ke WhatsApp
</a>

  </div>

</div>

<div id="toast" class="toast"></div>

<script src="app.js"></script>

</body>
</html>
