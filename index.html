<!DOCTYPE html>

<html lang="ms">

<head>

  <meta charset="UTF-8" />

<meta
 name="viewport"
 content="width=device-width, initial-scale=1.0"
/>

  <title>
    RMS Rumpun Selangor Registry
  </title>

  <link
    rel="stylesheet"
    href="style.css"
  />

</head>

<body>

<div class="container">

  <div class="card">

<img
  src="https://arleta.site/interactivelink/1610/RMS-JATA.png"
  alt="Logo RMS Rumpun Selangor"
  class="logo"
/>

<h1>
  RMS RUMPUN SELANGOR
</h1>

<p class="subtitle">
  Sistem Pendaftaran Penyertaan Program RMS Rumpun Selangor 2026
</p>

<form id="silatForm">

  <label for="pertubuhan">
    Nama Pertubuhan
  </label>

  <input
    type="text"
    id="pertubuhan"
    name="pertubuhan"
    autocomplete="organization"
    required
  />

  <label for="pengerusi">
    Nama Pengerusi / Tok Guru
  </label>

  <input
    type="text"
    id="pengerusi"
    name="pengerusi"
    autocomplete="name"
    required
  />

  <label for="peserta">
    Jumlah Peserta
  </label>

  <input
    type="number"
    id="peserta"
    name="peserta"
    min="1"
    max="500"
    required
  />

  <label for="catatan">
    Catatan
  </label>

  <textarea
    id="catatan"
    name="catatan"
    rows="4"
  ></textarea>

  <button type="submit">
    Hantar Penyertaan
  </button>

</form>

<div id="status"></div>


  </div>

</div>

<script src="app.js"></script>

</body>
</html>
